<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>admin-web · 看板</title>
<link rel="stylesheet" href="/vendor/pico.min.css">
<link rel="stylesheet" href="/dashboard.css">
</head>
<body>
<header class="topbar">
  <nav>
    <ul><li><strong>admin-web</strong></li></ul>
    <ul>
      <li><a href="/" class="active">看板</a></li>
      <li><a href="/skills">skills</a></li>
      <li><a href="/tasks">tasks</a></li>
      <li><a href="/feedback">feedback</a></li>
    </ul>
    <ul>
      <li><small id="whoami"></small></li>
      <li><a href="#" id="logout">登出</a></li>
    </ul>
  </nav>
</header>

<main class="container">
  <div class="filters">
    <select id="range-select">
      <option value="7d">最近 7 天</option>
      <option value="30d" selected>最近 30 天</option>
      <option value="1y">最近一年</option>
      <option value="all">全部</option>
    </select>
    <select id="user-select">
      <option value="">全部用户</option>
    </select>
  </div>

  <div class="stat-row" id="stat-row"></div>

  <article>
    <h2>每日 token 用量（input / output / cache read / cache creation）</h2>
    <canvas id="daily-chart" height="90"></canvas>
  </article>

  <article>
    <h2>按模型估算花费</h2>
    <canvas id="model-chart" height="120"></canvas>
  </article>

  <article>
    <h2>按项目估算花费</h2>
    <canvas id="project-chart" height="120"></canvas>
  </article>

  <article>
    <h2>按用户估算花费</h2>
    <canvas id="user-chart" height="90"></canvas>
  </article>

  <article>
    <h2>Session 列表</h2>
    <table>
      <thead>
        <tr>
          <th data-sort="time" class="active">最后活动</th>
          <th>标题</th>
          <th>用户</th>
          <th>项目</th>
          <th class="num" data-sort="cost">估算花费</th>
        </tr>
      </thead>
      <tbody id="session-rows"></tbody>
    </table>
  </article>
</main>

<div id="detail-overlay"></div>
<div id="detail-panel"></div>

<script src="/vendor/chart.umd.js"></script>
<script src="/dashboard.js"></script>
<script src="/feedback-widget.js"></script>
</body>
</html>
