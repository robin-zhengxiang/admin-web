<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>admin-web · 看板</title>
<link rel="stylesheet" href="/dashboard.css">
</head>
<body>
<div class="topbar">
  <nav>
    <a href="/" class="active">看板</a>
    <a href="/skills">skills</a>
    <a href="/tasks">tasks</a>
    <a href="/feedback">feedback</a>
  </nav>
  <div>
    <span id="whoami"></span>
    <a id="logout" href="#">登出</a>
  </div>
</div>

<main>
  <div class="filters">
    <select id="range-select">
      <option value="7d">最近 7 天</option>
      <option value="30d" selected>最近 30 天</option>
      <option value="1y">最近一年</option>
      <option value="all">全部</option>
    </select>
    <select id="user-select">
      <option value="">全部用户</option>
    </select>
  </div>

  <div class="stat-row" id="stat-row"></div>

  <div class="card">
    <h2>每日 token 用量（input / output / cache read / cache creation）</h2>
    <canvas id="daily-chart" height="90"></canvas>
  </div>

  <div class="card">
    <h2>按模型估算花费</h2>
    <canvas id="model-chart" height="120"></canvas>
  </div>

  <div class="card">
    <h2>按项目估算花费</h2>
    <canvas id="project-chart" height="120"></canvas>
  </div>

  <div class="card">
    <h2>按用户估算花费</h2>
    <canvas id="user-chart" height="90"></canvas>
  </div>

  <div class="card">
    <h2>Session 列表</h2>
    <table>
      <thead>
        <tr>
          <th data-sort="time" class="active">最后活动</th>
          <th>标题</th>
          <th>用户</th>
          <th>项目</th>
          <th class="num" data-sort="cost">估算花费</th>
        </tr>
      </thead>
      <tbody id="session-rows"></tbody>
    </table>
  </div>
</main>

<div id="detail-overlay"></div>
<div id="detail-panel" style="display:none"></div>

<script src="/vendor/chart.umd.js"></script>
<script src="/dashboard.js"></script>
<script src="/feedback-widget.js"></script>
</body>
</html>
